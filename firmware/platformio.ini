; PlatformIO — 2 môi trường build dùng chung lib/common
;   pio run -e esp1-main          : build firmware ESP1 (Main Node)
;   pio run -e esp2-sensor        : build firmware ESP2 (Sensor Node)
;   pio run -e esp1-main -t upload : nạp ESP1
;   pio device monitor            : xem Serial 115200

[platformio]
default_envs = esp1-main, esp2-sensor

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=2
lib_deps =
    bblanchon/ArduinoJson@^7.0.0

; --------- ESP1: Main Node ---------
[env:esp1-main]
build_src_filter = -<*> +<esp1_main/>
build_flags =
    ${env.build_flags}
    -DDEVICE_ROLE_MAIN
lib_deps =
    ${env.lib_deps}
    mobizt/Firebase Arduino Client Library for ESP8266 and ESP32@^4.4.14

; --------- ESP2: Sensor Node ---------
[env:esp2-sensor]
build_src_filter = -<*> +<esp2_sensor/>
build_flags =
    ${env.build_flags}
    -DDEVICE_ROLE_SENSOR
lib_deps =
    ${env.lib_deps}
    adafruit/Adafruit SHT31 Library@^2.2.2

; --------- Native: unit test logic THUẦN trên PC (không cần ESP32) ---------
;   pio test -e native      : chạy test/ (cần trình biên dịch host gcc/g++/clang)
;   Chỉ test lib/control (header thuần); KHÔNG build src/ hay lib/common (Arduino).
[env:native]
platform = native
build_src_filter = -<*>
test_framework = unity
test_filter = test_deadband
